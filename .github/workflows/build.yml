name: Build LilJustin

# Builds an unsigned LilJustin.app, wraps it in a .dmg, and (when triggered by
# a v*.*.* tag) attaches the .dmg to a GitHub Release.
#
# No Apple Developer ID required. The output is unsigned — users will see a
# Gatekeeper prompt on first launch and need to bypass it once with
# `xattr -dr com.apple.quarantine /Applications/LilJustin.app` (documented in
# the README and in each release's auto-generated body).

on:
  # Run on every push to main — produces a fresh .dmg as a workflow artifact
  # (downloadable for 30 days). Useful for fast iteration: every commit gets
  # built, you can grab the artifact from the run page without tagging.
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  # And on tag pushes — additionally publishes a public GitHub Release.
  # The Release-creation step is gated on `startsWith(github.ref, 'refs/tags/v')`
  # so commits to main don't accidentally create Releases.
  workflow_dispatch: {}

# Default GITHUB_TOKEN on public repos is read-only. Creating a Release
# (and asking the API for auto-generated release notes) needs write
# access to the repo's contents. This is a per-workflow override; nothing
# leaves the repo's own scope.
permissions:
  contents: write

jobs:
  build:
    name: Build & package .dmg
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available targets and schemes (debug)
        run: |
          xcodebuild -list -project lil-agents.xcodeproj || true

      - name: Resolve Swift Package Manager dependencies
        run: |
          xcodebuild \
            -project lil-agents.xcodeproj \
            -scheme LilAgents \
            -resolvePackageDependencies

      - name: Resolve build version from tag (or main)
        id: version
        run: |
          # MARKETING_VERSION → CFBundleShortVersionString (semver, what
          # users see). For tag pushes, strip the leading 'v'. For
          # main pushes, use 0.0.<run_number> so each main build is a
          # monotonically-newer prerelease that won't displace a real
          # tagged build's version comparison.
          # CURRENT_PROJECT_VERSION → CFBundleVersion (build number).
          # Always the run number so each CI run produces a strictly
          # newer build number.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            MARKETING_VERSION="${GITHUB_REF_NAME#v}"
          else
            MARKETING_VERSION="0.0.${{ github.run_number }}"
          fi
          BUILD_NUMBER="${{ github.run_number }}"
          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Building LilJustin $MARKETING_VERSION (build $BUILD_NUMBER)"

      - name: Build LilJustin (unsigned, Release configuration)
        run: |
          xcodebuild build \
            -project lil-agents.xcodeproj \
            -scheme LilAgents \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PRODUCT_NAME=LilJustin \
            PRODUCT_BUNDLE_IDENTIFIER=team.yourorbit.LilJustin \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            ONLY_ACTIVE_ARCH=NO

      - name: Locate built .app
        id: locate
        run: |
          set -e
          APP_PATH=$(find build -name "LilJustin.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find LilJustin.app under build/"
            find build -name "*.app" -type d
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found .app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Build .dmg via hdiutil
        id: dmg
        run: |
          set -e
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          VERSION="${GITHUB_REF_NAME:-dev-$(date +%Y%m%d-%H%M%S)}"
          DMG_NAME="LilJustin-${VERSION}.dmg"

          mkdir -p dist dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create \
            -volname "LilJustin" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "dist/${DMG_NAME}"

          echo "dmg_path=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Upload .dmg as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dmg.outputs.dmg_name }}
          path: ${{ steps.dmg.outputs.dmg_path }}
          retention-days: 30

      # ── Sparkle appcast generation ─────────────────────────────────
      # Sparkle (the macOS auto-update framework bundled into LilJustin)
      # needs two things to verify and install an update:
      #   1. An Ed25519 signature on the .dmg, made with the private key
      #      that pairs with SUPublicEDKey in Info.plist.
      #   2. An appcast.xml file describing the new version + the
      #      signature, hosted at SUFeedURL (which points at
      #      /releases/latest/download/appcast.xml — auto-redirects to
      #      whichever semver tag is currently the "Latest" release).
      #
      # The signing key lives in the SPARKLE_ED_PRIVATE_KEY repo secret
      # (32-byte raw key, base64-encoded). If the secret is absent, this
      # block skips silently — Sparkle just won't see updates until the
      # secret lands.
      - name: Install Sparkle CLI tools (sign_update)
        if: env.SPARKLE_ED_PRIVATE_KEY != ''
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -e
          SPARKLE_VERSION="2.6.4"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle
          # Locate sign_update — Sparkle ships it under bin/
          SIGN_UPDATE=$(find /tmp/sparkle -name "sign_update" -type f | head -n 1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "::error::sign_update not found in Sparkle bundle"
            find /tmp/sparkle -maxdepth 4 -type f -name 'sign*'
            exit 1
          fi
          chmod +x "$SIGN_UPDATE"
          echo "SIGN_UPDATE=$SIGN_UPDATE" >> "$GITHUB_ENV"

      - name: Sign .dmg + generate appcast.xml
        id: appcast
        if: env.SPARKLE_ED_PRIVATE_KEY != ''
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -e
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"
          DMG_NAME="${{ steps.dmg.outputs.dmg_name }}"
          # Version: tag name (without leading v) for tag pushes,
          # otherwise a sortable build number from the run id.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            SHORT_VERSION="$VERSION"
          else
            VERSION="0.0.${{ github.run_number }}"
            SHORT_VERSION="dev-${VERSION}"
          fi
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}"

          # Write the private key to a temp file for sign_update -f
          KEY_FILE=$(mktemp)
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"

          # Sign — sign_update outputs:
          #   sparkle:edSignature="..." length="..."
          SIG_OUTPUT=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG_PATH")
          rm -f "$KEY_FILE"
          echo "sign_update output: $SIG_OUTPUT"
          ED_SIGNATURE=$(echo "$SIG_OUTPUT" | grep -oE 'sparkle:edSignature="[^"]*"' | sed 's/.*="\(.*\)"/\1/')
          DMG_LENGTH=$(echo "$SIG_OUTPUT" | grep -oE 'length="[^"]*"' | sed 's/.*="\(.*\)"/\1/')
          if [ -z "$ED_SIGNATURE" ] || [ -z "$DMG_LENGTH" ]; then
            echo "::error::Could not parse sign_update output"
            exit 1
          fi

          PUB_DATE=$(LC_TIME=C date -u +"%a, %d %b %Y %H:%M:%S +0000")

          # Generate appcast.xml referencing this build's .dmg.
          mkdir -p dist
          cat > dist/appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>LilJustin</title>
              <link>https://github.com/${GITHUB_REPOSITORY}/releases/latest</link>
              <description>LilJustin — the founder of Orbit, on your desktop.</description>
              <language>en</language>
              <item>
                <title>LilJustin ${SHORT_VERSION}</title>
                <link>https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}</link>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${SHORT_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  length="${DMG_LENGTH}"
                  type="application/octet-stream"
                  sparkle:edSignature="${ED_SIGNATURE}" />
              </item>
            </channel>
          </rss>
          APPCAST

          echo "appcast_path=dist/appcast.xml" >> "$GITHUB_OUTPUT"
          echo "Generated appcast.xml:"
          cat dist/appcast.xml

      # Rolling 'latest' release — refreshed on every push to main so the
      # GitHub Releases page always carries the freshest .dmg. Sits
      # alongside semver-tagged releases (v0.1.0, v0.2.0, etc); the
      # `latest` tag force-moves to the current commit each time.
      - name: Update rolling 'latest' release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "LilJustin — latest dev build"
          files: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.appcast.outputs.appcast_path }}
          prerelease: true
          make_latest: "false"  # don't displace tagged semver releases as 'Latest' on the repo homepage
          body: |
            **Mini Justin — the founder of [Orbit](https://get.yourorbit.team), on your desktop.** This is the rolling latest dev build, refreshed on every push to `main`. For tagged stable releases see the [Releases list](https://github.com/justinwilliames-sketch/liljustin/releases).

            Built from commit [`${{ github.sha }}`](https://github.com/justinwilliames-sketch/liljustin/commit/${{ github.sha }}).

            > [!IMPORTANT]
            > **You MUST run a Terminal command before this app will open.**
            > LilJustin is unsigned (free side-project, no Apple Developer ID), so macOS Gatekeeper will refuse to launch it with an error like "*LilJustin can't be opened because Apple cannot check it for malicious software*" or "*LilJustin is damaged and can't be opened*".
            >
            > **The fix is one command. Skip it and the app will not open.**

            ## Install — three steps, do all of them

            ### 1. Download the .dmg below

            ### 2. Drag LilJustin into Applications

            Open the `.dmg`, drag the **LilJustin** icon into the **Applications** shortcut.

            ### 3. ⚠️ REQUIRED — run this in Terminal

            ```bash
            xattr -dr com.apple.quarantine /Applications/LilJustin.app
            ```

            One-time per install. Right-click → **Open** also works, as does System Settings → Privacy & Security → "Open Anyway".

            ### 4. Launch from Applications

            Mini Justin will appear above your Dock as an animated character.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tagged GitHub Release with .dmg + appcast
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.appcast.outputs.appcast_path }}
          name: LilJustin ${{ github.ref_name }}
          generate_release_notes: true
          # Tagged semver releases must be non-prerelease so GitHub's
          # /releases/latest/download/* redirect resolves correctly.
          # Sparkle's SUFeedURL points at that URL — when this was
          # `true` (the prior default), Sparkle hit a 404 and threw
          # "An error occurred in retrieving update information" on
          # every Check for Updates click. Mark it stable; the rolling
          # `latest` tag below uses make_latest:false so this
          # tagged release becomes the canonical Latest on the repo
          # homepage and the redirect target.
          prerelease: false
          make_latest: "true"
          body: |
            **Mini Justin — the founder of [Orbit](https://get.yourorbit.team), on your desktop.**

            > [!IMPORTANT]
            > **You MUST run a Terminal command before this app will open.**
            > LilJustin is unsigned (free side-project, no Apple Developer ID), so macOS Gatekeeper will refuse to launch it with an error like "*LilJustin can't be opened because Apple cannot check it for malicious software*" or "*LilJustin is damaged and can't be opened*".
            >
            > **The fix is one command. Skip it and the app will not open.**

            ## Install — three steps, do all of them

            ### 1. Download the .dmg

            Click `${{ steps.dmg.outputs.dmg_name }}` below.

            ### 2. Drag LilJustin into Applications

            Open the `.dmg`, drag the **LilJustin** icon into the **Applications** shortcut.

            ### 3. ⚠️ REQUIRED — run this in Terminal to allow the app to open

            Open the **Terminal** app (Spotlight → "Terminal") and paste this exact command, then press Enter:

            ```bash
            xattr -dr com.apple.quarantine /Applications/LilJustin.app
            ```

            This removes Apple's "downloaded from internet" quarantine flag from the app. **Without this step, double-clicking LilJustin will fail.** It's a one-time command per install — you don't need to do it again unless you re-download.

            **Alternatives if you can't use Terminal:**
            - Right-click `LilJustin.app` in Applications → choose **Open** → confirm the warning. Repeat once and macOS remembers the choice.
            - System Settings → **Privacy & Security** → scroll down → click "**Open Anyway**" next to the LilJustin block.

            ### 4. Launch from Applications

            Open Mini Justin from your Applications folder. He'll appear above your Dock as an animated character.

            ---

            ## Setup

            Mini Justin needs a model provider. Open **Settings → Models** and pick one:

            - **Claude Code** — if you already have the CLI installed and logged in, it'll be auto-detected.
            - **Codex / ChatGPT** — same deal, auto-detected if logged in.
            - **OpenAI API** — paste your key in Settings.

            ## What this is

            A free, open-source easter-egg companion to the main [Orbit MCP extension](https://get.yourorbit.team/download). Click the dock character to chat with the founder about lifecycle marketing, deliverability, Braze, retention. Direct, no-fluff, in Justin's voice.

            For the deeper, structured Orbit tooling (95 guides, 50+ skills, native Braze integration) install the full [Orbit MCP](https://get.yourorbit.team/download).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
